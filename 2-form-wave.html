<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Wave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: steelblue;
            font-family: Poppins, sans-serif;
            overflow: hidden;
            margin: 0;
            color: #fff;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 4px;
        }

        .container h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .container a {
            text-decoration: none;
            color: lightblue;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: lightblue;
            font-family: inherit;
            font-size: 16px;
            border: 0;
            border-radius: 5px;
        }

        .btn:focus,
        .btn:active {
            outline: 0;
            border: 0;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .text {
            margin-top: 30px;
        }

        .form-control {
            position: relative;
            margin: 20px 0 40px;
            width: 300px;
        }

        .form-control input {
            background-color: transparent;
            border: 0;
            border-bottom: 2px solid #fff;
            display: block;
            padding: 15px 0;
            width: 100%;
            font-size: 18px;
            color: #fff;
        }

        .form-control input:focus,
        .form-control:valid {
            outline: 0;
            border-bottom-color: lightblue;
        }

        .form-control label {
            position: absolute;
            top: 15px;
            left: 0;
        }

        .form-control label span {
            display: inline-block;
            font-size: 18px;
            min-width: 5px;
            transition: .3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .form-control input:focus+label span,
        .form-control input:valid+label span {
            color: lightblue;
            transform: translateY(-30px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Please Login</h1>
        <form action="">
            <div class="form-control">
                <input type="text" required>
                <label for="text">Email</label>
            </div>
            <div class="form-control">
                <input type="password" required>
                <label for="password">Password</label>
            </div>
            <button class="btn">Login</button>
            <p class="text">Don't have an account?<a href="#">Register</a></p>
        </form>
    </div>
    <script>
        document.querySelectorAll(".form-control label").forEach(label => label.innerHTML = label.innerText.split("").map((letter, idx) => `<span style="transition-delay: ${idx * 150}ms;">${letter}</span>`).join(""))
    </script>
</body>

</html>
